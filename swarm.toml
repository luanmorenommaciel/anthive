# anthive configuration — per-project
#
# This file lives at the root of any repo where anthive dispatches sessions.
# Copy to your project and customize. Run `anthive init` to scaffold.

[project]
name = "anthive"
# the working name of this repo — shows up in dashboards and logs

[dispatcher]
# Default dispatcher mode. Options: "local" | "cloud"
# Local uses your Claude Max subscription (free at margin).
# Cloud uses Managed Agents API (pay-per-token + $0.08/session-hour).
default = "local"

[dispatcher.local]
auth = "subscription"              # "subscription" = uses Claude Code OAuth
worktree_dir = "worktrees/"         # where session worktrees land (gitignored)
tmux_session_prefix = "anthive-"    # tmux session names: {prefix}{slug}
default_model = "sonnet"            # claude model alias
max_concurrent_sessions = 4         # global cap across all active sessions

[dispatcher.cloud]
auth = "api_key"                    # always API key (Managed Agents requires Console credits)
api_key_env = "ANTHROPIC_API_KEY"   # env var name (not the key itself — never commit keys)
environment_id = ""                 # pre-created environment ID; empty = create per session
budget_cap_usd = 5.00               # per-session hard cap
require_confirm = true              # show pre-flight cost estimate, require --yes
max_concurrent = 3                  # conservative until real limits known
daily_budget_usd = 50.00            # global daily spend cap; dispatch refuses when exceeded

[observability]
# Langfuse is the backend for cost/token/state tracking.
langfuse_url = "http://localhost:3000"
# Set these as env vars; do NOT put keys in this file:
#   LANGFUSE_PUBLIC_KEY=pk-lf-...
#   LANGFUSE_SECRET_KEY=sk-lf-...
otel_endpoint = "http://localhost:3000/api/public/otel"

[observability.alerts]
budget_exceeded = true              # beep + slack on per-session budget exceed
session_blocked = true              # ping when a session hits BLOCKED status
session_ready = false               # quieter by default; flip to true for proactive merge pings
slack_webhook_env = "SLACK_WEBHOOK" # env var for Slack webhook URL (optional)

[paths]
tasks_dir = "tasks/"
sessions_dir = "logs/sessions/"
merge_queue = "logs/merge-queue.md"
decisions_dir = "logs/decisions/"
archive_dir = "logs/archive/"
prompts_dir = "prompts/"            # generated by compose, gitignored

[agents]
# Default agent when task frontmatter omits `agent:`
fallback = "python-developer"
# Heuristic matcher picks from .claude/agents/** based on task title/body
heuristic_match = true

[git]
branch_prefix = "session/"          # branches named session/<slug>
merge_strategy = "no-ff"            # always merge --no-ff (preserve session commit graph)
allow_force_push = false            # never force-push from anthive
respect_hooks = true                # never --no-verify
