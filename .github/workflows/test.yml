name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      OTEL_SDK_DISABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:0/disabled"
      LANGFUSE_PUBLIC_KEY: "test"
      LANGFUSE_SECRET_KEY: "test"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check anthive/

      - name: Lint (black)
        run: black --check anthive/

      - name: Unit + integration tests (fast lane)
        run: pytest anthive/ -v -m "not e2e"

      - name: End-to-end CLI tests
        run: pytest anthive/tests/e2e/ -v

      - name: Full suite with coverage
        run: pytest anthive/ -v --cov=anthive --cov-report=term-missing --cov-fail-under=70
